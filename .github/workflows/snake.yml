# Generates the animated contribution snake and pushes SVGs to the `output` branch.
name: generate snake
on:
  schedule:
    - cron: "0 0 * * *"      # daily
  workflow_dispatch:          # manual run button
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: generate svgs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#FF5D73&color_dots=#0E0E16,#3a3f6b,#5468ff,#8f9bff,#FF5D73

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
